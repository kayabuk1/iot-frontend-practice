<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="script.js"></script>
</head>
<body>
    <button>ボタン</button>
    <script>
        // HTML内にJavaScriptを記述する場合は、body要素の
        // 一番最後に記述するのが決まり。⇒なぜ？
        // HTML要素（DOM）がメモリ上に完全に読み込まれ、
        // 準備が完了するのを待つため
        /*ブラウザはHTMLファイルを上から順番に読み込み、
        解析（パース）していきます。 もし、<script> を 
        <button> より上（例えば <head> の中など）に書いてしまうと、
        以下の順序で処理が走ってしまいます。
        1.スクリプトが実行され、document.querySelectorAll("button")
         が呼ばれる。
        2.しかし、この時点ではブラウザはまだ下の <button> を
            読み込んでいないため、メモリ上にボタンが存在しません。
        3.結果として「ボタンは見つかりませんでした」となり、
            クリックしても何も起きないバグが発生します
        そのため、**「画面を構成するすべてのHTMLタグが読み込まれた後
        （< /body> の直前）にスクリプトを配置する」**というのが、
        最も安全で確実な定石となっているのです*/
        
    </script>
</body>
</html>
