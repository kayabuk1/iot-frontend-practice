<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            outline: 1px solid red;
        }
        button{
            color: green;
            background-color: yellow;
            max-width: 100%;
            max-height: 100%;
            transition-property: color, background;
            transition-duration: 1s;
            transition-delay: 0.5s;
            transition-timing-function: ease;
        }
        button:hover{
            color: yellow;
            background-color: green;
        }
        #button2{
            color: green;
            background-color: yellow;
            max-width: 100%;
            max-height: 100%;
            min-width: 100px;
            transition-property: 
                color 3s ease 0.5s,
                background 3s linear 0.5s,
                width 1s ease-in 0.5s;

        }
        #button2:hover{
            color: yellow;
            background-color: green;
            min-width: 300px;
        }
    </style>
</head>
<body>
    <button>ボタン</button>
    <button id="button2">ボタン2</button>
</body>
</html>
