<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Tech</title>
    <!-- <link rel="stylesheet" href="style.css"> -->

    <style>
        @charset "UTF-8";
        :root {--header-height:70px;}
        * {
            outline: 1px solid red; 
            background-color: rgba(0,128,255,0.1);
            background-clip: content-box;
            margin: 0; padding: 0; box-sizing: border-box; list-style: none;}
        html {font-size: 100%; scroll-behavior: smooth;
            scroll-padding-top: var(--header-height,70px);}
        body {font-size: 0.9rem; color:#333333; background-color: 
            #f9f9f9;
            accent-color: #c0392b; font-family: Arial, Helvetica, sans-serif;}
        a {color: #333333; text-decoration: none;}
        a:hover {opacity: 0.8;}
        a:active {opacity: 0.6;}
        img {max-width: 100%;}
        .wrapper {max-width: 960px; margin: 0 auto; padding: 0 5px;
            text-align: center;}
        
        .site-title a { display: flex; height: 100%; color: #c0392b;
            padding: 0.2em;}
        header {position: fixed; top: 0; left: 0; z-index: 2;
            height: var(--header-height); width: 100%;
            background-color: #f9f9f9dd;}
        header .wrapper {display: flex; justify-content: space-between;
            align-items: center; height: 100%; width: 100%;}
        header nav {flex-grow: 0;}
        header ul.sidemenu-container{ display: flex; column-gap: 20px;
            padding-right: 10px;}
        
        section {margin-bottom: 100px;}
        section .section-title { font-size: 2em;
            text-decoration-line: underline; text-underline-offset: 0.2em;
            text-decoration-thickness: 0.15em; text-decoration-color: #c0392b;}
        
        #mainvisual {position: relative; height: 600px;
            margin-top: var(--header-height,70px); overflow: hidden;}
        #mainvisual .mainvis-container {position: absolute; top: 0; left: 0;
            height: 100%; width: 100%;}
        #mainvisual img {width: 100%; height: 100%; object-fit: cover;}
        #mainvisual .img-center-txt{position: absolute; top: 50%; left: 50%;
            z-index: 1; transform: translate(-50%,-50%);
            background-color: transparent; text-align: center;
            color: #f9f9f9;}
        #mainvisual h2 {font-size: 2.3em; text-align-last: justify;
            letter-spacing: 0.05em; padding-bottom: 0.2em;}
        
        #ourmenu h2 {padding-bottom: 0.8em;}
        #ourmenu .grid-container {display: grid; 
            grid-template-columns: 1fr 1fr; grid-column-gap:3%;
            text-align: left;}
        #ourmenu div.grid-content {border: 1px solid #cccccc;
            border-radius: 5px; overflow: hidden; background-color: #fff;}
        #ourmenu img {width: 100%; aspect-ratio: 10/3; 
            object-fit: cover; object-position: 0% 30%;}
        #ourmenu dt {font-weight: bold; padding: 1em;}
        #ourmenu dd {padding: 1em;}
        #ourmenu p {color: #c0392b; font-weight: bold; padding: 1em;}

        #contact {width: 60%; margin: 0 auto 5%; text-align: center;}
        #contact h2 {padding-bottom: 0.8em;}
        #contact p {padding: 1em;}
        #contact form {display: flex; flex-direction: column;
            text-align: left; border: 1px solid #cccccc; 
            border-radius: 5px; overflow: hidden; width: 100%;
            background-color: #fff;}
        #contact label {font-weight: bold; display: block;
            padding-bottom: 0.6em;}
        #contact input {border-radius: 3px; width: 100%; overflow: hidden;
            border: 1px solid #ccc; padding: 1em;}
        #contact textarea {height: 6em; width: 100%; padding: 1em;
            border-radius: 3px; overflow: hidden;} 
        #contact .btn-container {display: flex; justify-content: center;
            height: 100%; border: 1px solid #ccc; border-radius: 3px;
            overflow: hidden; padding: 0; margin: 1em; 
            background-color: #c0392b;}
        #contact button {color: #f9f9f9; border: none; cursor: pointer;
            width: 100%; padding: 1em; background-color: #c0392b;}
        
        footer {background-color: #333333; color: #f9f9f9;}
        footer p {padding: 1em; margin: 0 auto; width: max-content;}

        @media screen and (max-width:767px) 
        {
            html {scroll-padding-top: 90.5px;} 
            header {height: auto; padding: 10px 0;}
            header .wrapper {flex-direction: column;
                justify-content: center;
            }
            header nav {width: 100%;}
            header ul {flex-direction: row; justify-content: center;
                margin-top:10px; width: 100%; }
            
            #mainvisual {height: 300px; margin-top: 90.5px;}
            #mainvisual h2 {text-align: initial; white-space: nowrap;}
            #mainvisual p {white-space: nowrap;}

            #ourmenu dl.grid-container {grid-template-columns: 1fr;
                grid-row-gap: 3%;}
            
            #contact {width: 90%;}
        }


    </style>

</head>

<body id="top">
    <header>
        <div class="wrapper">
            <h1 class="site-title"><a href="">Cafe Tech</a></h1>
            <nav>
                <ul class="sidemenu-container">
                    <li><a href="#top">Home</a></li>
                    <li><a href="#ourmenu">Menu</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="mainvisual">
            <div class="mainvis-container">
                <img src="" alt="">
            </div>
            <div class="img-center-txt">
                <h2>Cafe Tech</h2>
                <p>至福の一杯を、あなたに。</p>
            </div>
        </section>

        <section id="ourmenu">
            <div class="wrapper">
                <h2 class="section-title">Our Menu</h2>
                    <dl class="grid-container">
                        <div class="grid-content">
                            <div class="grid-img-content">
                                <img src="" alt="">
                            </div>
                            <dt>こだわりのコーヒー</dt>
                            <dd>厳選された</dd>
                            <p>￥５００円</p>
                        </div>
                        <div class="grid-content">
                            <div class="grid-img-content">
                                <img src="" alt="">
                            </div>
                            <dt>本日のケーキ</dt>
                            <dd>季節のフルーツを</dd>
                            <p>￥６００円</p>
                        </div>
                    </dl>
            </div>
        </section>

        <section id="contact">
            <h2 class="section-title">Conatct Us</h2>
            <p></p>
            <form action="" method="POST">
                <p>
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name"
                    required placeholder="山田太郎">
                </p>
                <p>
                    <label for="email">メールアドレス</label>
                    <input type="text" name="email" id="email"
                    required placeholder="example@.com">
                </p>
                <p><label for="detail">お問い合わせ内容</label>
                    <textarea name="detail" id="detail"
                    required placeholder="お問い合わせ内容を"></textarea>
                </p>
                <div class="btn-container">
                    <button>送信する</button>
                </div>
            </form>

        </section>
    
    </main>

    <footer>
        <p><small>&copy;</small></p>

    </footer>
</body>
</html>
