<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5.非同期処理（カウントタイマー：再帰処理）</title>
</head>
<body>
    <section>
        <h1>5.非同期処理（カウントタイマー：再帰処理）</h1>
        <p>1秒経過したらログを出力する処理を同期的に
            (時間が経過するまで待機して)３回実行する</p>
        <button id="start">スタート</button>
    </section>
    <section>
        <label for="console">コンソール</label><br>
        <textarea name="console" id="console" rows="10" cols="100" readonly>
        </textarea>
        <button id="clear-console">クリア</button>
    </section>

    <script>
        const console = {
            // consoleを上書きして、id=consoleの値として出力するように
            // している。JSでは{}で囲ったものがオブジェクトになり、今回は
            // logというメソッドオブジェクトを指定している。
            // =>はアロー演算子 function(str) と(str)=>は等価。
            log: (str) =>{
                document.querySelector('#console').value += `${str}\n`
                // +=引数でもらった文字列自身をvalueに\n付で追加している。
            }
        };
        document.querySelector('#clear-console').addEventListener
        ('click', ()=>{       
            document.querySelector('#console').value = '';
            }
        ); //valueの中身を今度は""で上書き＝クリア"
        
        document.querySelector('#start').addEventListener('click',()=>
        {
            const countTime = 3;
            console.log(`${countTime}秒間のタイマーを開始しました。`);
            runTimer(1, countTime);
        }
        );

        // ↓再帰的に処理するために新たに関数を作る
        function runTimer(curTime, maxTime){
            // ↑再帰的処理を行うには無限実行にならないように
            // 何回処理を行うかの数と、最大回数など上限の数を今回は渡す。
            if(curTime > maxTime) return;
            wait(1, (endTimeString)=>{
                    console.log(`${curTime}秒が経過しました。(${endTimeString})`);
                    runTimer(curTime+1, maxTime);}
                );
        }

        // ↓JSには何秒間待機するという組込み関数がないので、自作する
        function wait(seconds, callback){ 
            setTimeout(()=>{
                callback(new Date().toLocaleString());
                }, seconds*1000);
        }
    </script>
</body>
</html>
